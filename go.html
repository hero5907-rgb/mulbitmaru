<!doctype html>

<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>물빛마루 업무수첩</title>

<meta property="og:type" content="website" />
<meta property="og:title" content="물빛마루 업무수첩" />
<meta property="og:description" content="물빛마루 업무수첩 설치" />
<meta property="og:url" content="https://mulbitmaru.khanreal.kr/go.html" />
<meta property="og:image" content="https://mulbitmaru.khanreal.kr/icons/icon-192.png" />

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;
  background:#f2f2f7;
}

.card{
  width:min(430px,100%);
  background:#fff;
  border-radius:32px;
  padding:32px 24px;
  text-align:center;
  box-shadow:
    0 10px 40px rgba(0,0,0,.08);
}

.logo{
  width:88px;
  height:88px;
  margin:0 auto 18px;
  border-radius:24px;
  background:#8CC63F;
  color:#fff;
  font-size:42px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.title{
  font-size:28px;
  font-weight:800;
  color:#111827;
}

.desc{
  margin-top:12px;
  color:#6b7280;
  line-height:1.6;
  font-size:15px;
}

.btn{
  width:100%;
  height:58px;
  border:none;
  border-radius:18px;
  font-size:17px;
  font-weight:700;
  margin-top:14px;
  cursor:pointer;
}

.android{
  background:#8CC63F;
  color:#fff;
}

.ios{
  background:#f3f4f6;
  color:#111827;
}

.notice{
  margin-top:18px;
  font-size:13px;
  color:#6b7280;
  line-height:1.5;
}
</style>

</head>

<body>

<div class="card">

  <img
  src="https://mulbitmaru.khanreal.kr/icons/icon-192.png"
  style="
    width:88px;
    height:88px;
    border-radius:22px;
    margin-bottom:18px;
  ">

  <div class="title">
    물빛마루 업무수첩
  </div>

  <div class="desc">
    앱으로 설치하면<br>
    더 빠르고 편리하게 사용할 수 있습니다.
  </div>

<button
 class="btn android"
 onclick="installAndroid()">
🤖 안드로이드 설치 </button>

<button
 class="btn ios"
 onclick="installIOS()">
🍎 아이폰 설치 </button>

  <div class="notice" id="browserNotice"></div>

</div>

<script>

const APP_URL =
"https://mulbitmaru.khanreal.kr/";

function copyAddress(){

  if(navigator.clipboard){

    navigator.clipboard.writeText(APP_URL);

  }

}

function installAndroid(){

  alert(
`1. 크롬으로 이동합니다.

2. 앱이 열리면

우측 상단 ⋮

→ 앱 설치

를 눌러 설치하세요.`
  );

  const u = new URL(APP_URL);

  const hostPath =
    u.host +
    u.pathname +
    u.search;

  const fallback =
    encodeURIComponent(APP_URL);

  location.href =
    "intent://" +
    hostPath +
    "#Intent;scheme=https;" +
    "package=com.android.chrome;" +
    "action=android.intent.action.VIEW;" +
    "category=android.intent.category.BROWSABLE;" +
    "S.browser_fallback_url=" +
    fallback +
    ";" +
    "end";

}

function installIOS(){

  copyAddress();

  alert(
`주소가 복사되었습니다.

1. Safari 실행

2. 주소 붙여넣기

3. 공유버튼(□↑)

4. 홈 화면에 추가

를 선택하세요.`
  );

}

(function(){

  const ua =
    navigator.userAgent;

  const notice =
    document.getElementById(
      "browserNotice"
    );

  if(/KAKAOTALK/i.test(ua)){

    notice.innerHTML =
      "카카오톡에서 열렸습니다.<br>우측 상단 메뉴 → 다른 브라우저로 열기";

  }else if(/NAVER|Band/i.test(ua)){

    notice.innerHTML =
      "인앱브라우저입니다.<br>외부 브라우저로 열기를 선택하세요";

  }

})();

</script>

</body>
</html>
